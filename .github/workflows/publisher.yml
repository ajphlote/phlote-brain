name: Phlote Publisher

on:
  push:
    paths:
      - 'publish/queue/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Get changed queue files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'publish/queue/' | tr '\n' ',')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Generate and publish content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node .github/scripts/publisher.js "${{ steps.changed.outputs.files }}"

      - name: Commit generated drafts
        run: |
          git config user.name "Phlote Brain"
          git config user.email "brain@phlote.co"
          git add publish/ 
          git diff --staged --quiet || git commit -m "Auto: generated drafts from queue"
          git push
